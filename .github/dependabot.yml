version: 2
updates:
  # No "swift" ecosystem here: this is an Xcode app, not a Swift package. Its
  # SPM dependency (heyhalo-reach-kit) lives in the generated .xcodeproj, which
  # is gitignored, so there's no Package.swift for Dependabot to scan. The Swift
  # updater does run on the heyhalo-reach-kit repo, which has a Package.swift.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
