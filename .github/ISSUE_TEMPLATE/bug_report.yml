name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please do not include any personal messages or tokens in screenshots or logs.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: iOS version, device, and app version/commit
      placeholder: "iOS 26.1, iPhone 16 Pro, commit abc1234"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Logs (redacted), screenshots, or context.
